<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <!-- Background decorative elements -->
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        
        <div class="header">
            <h1 class="title">NEON SNAKE</h1>
            <div class="score-board">
                <div class="score-box">
                    <span class="label">SCORE</span>
                    <span id="score">0</span>
                </div>
                <div class="score-box">
                    <span class="label">HIGH SCORE</span>
                    <span id="high-score">0</span>
                </div>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="game-canvas" width="400" height="400"></canvas>
            
            <!-- UI Overlays -->
            <div id="start-screen" class="overlay active">
                <div class="glass-panel">
                    <h2>READY?</h2>
                    <p>Use Arrow Keys, WASD, or On-Screen Controls</p>
                    <button id="start-btn" class="neon-btn">START GAME</button>
                </div>
            </div>
            
            <div id="game-over-screen" class="overlay">
                <div class="glass-panel">
                    <h2>GAME OVER</h2>
                    <p>Final Score: <span id="final-score">0</span></p>
                    <button id="restart-btn" class="neon-btn">PLAY AGAIN</button>
                </div>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div class="mobile-controls">
            <div class="control-row">
                <button class="control-btn" id="btn-up">↑</button>
            </div>
            <div class="control-row">
                <button class="control-btn" id="btn-left">←</button>
                <button class="control-btn" id="btn-down">↓</button>
                <button class="control-btn" id="btn-right">→</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
